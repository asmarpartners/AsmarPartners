<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asmar Partners — Lockup 3 · Palette Studies</title>
<style>
  :root{--ink:#11181f;--paper:#f7f8f9;--muted:#6a727b;--hair:#e6e9ed;}
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;}
  .wrap{max-width:1180px;margin:0 auto;padding:72px 40px 120px;}
  .mast{border-bottom:1px solid var(--ink);padding-bottom:28px;}
  .mast .kicker{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .mast h1{font-size:clamp(30px,5vw,52px);font-weight:800;letter-spacing:-.02em;margin:22px 0 0;line-height:1.02;}
  .mast .lede{max-width:64ch;margin:18px 0 0;color:#3b424a;font-size:15.5px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--hair);border:1px solid var(--hair);margin-top:40px;}
  .cell{background:#fff;padding:30px 26px 20px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;}
  .cell svg{display:block;max-width:100%;height:auto;}
  .cap{margin-top:20px;width:100%;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--hair);padding-top:12px;}
  .cap .id{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10px;letter-spacing:.1em;color:var(--ink);font-weight:600;}
  .cap .sw{display:flex;gap:0;}
  .cap .sw i{width:16px;height:16px;display:block;border:1px solid rgba(0,0,0,.08);}
  .hex{margin-top:8px;width:100%;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:9.5px;color:var(--muted);letter-spacing:.02em;}
  @media (max-width:820px){.grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="wrap">
  
  <div class="grid">
      
      
      
      
      
      
      
      
      
      <div class="cell">
        <svg width="240" height="170" viewBox="0 0 240 170" xmlns="http://www.w3.org/2000/svg" aria-label="Lockup 3 Sky to Navy">
          <g transform="translate(86,6) scale(0.5)">
            <path d="M50 22 L30 22 L30 118 L50 118 M90 22 L110 22 L110 118 L90 118" fill="none" stroke="#075985" stroke-width="9" stroke-linejoin="miter"></path>
            <rect x="56" y="35.5" width="28" height="14" fill="#7DD3FC"></rect>
            <rect x="56" y="63" width="28" height="14" fill="#0EA5E9"></rect>
            <rect x="56" y="90.5" width="28" height="14" fill="#075985"></rect>
          </g>
          <text x="120" y="118" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="26" font-weight="800" letter-spacing="-0.8" fill="#075985">Asmar</text>
          <text x="124.3" y="146" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="500" letter-spacing="8" fill="#075985">PARTNERS</text>
        </svg>
        <div class="cap">
          <span class="id">10 · SKY TO NAVY</span>
          <span class="sw"><i style="background:#7DD3FC"></i><i style="background:#0EA5E9"></i><i style="background:#075985"></i></span>
        </div>
        <div class="hex">#7DD3FC · #0EA5E9 · #075985</div>
      </div>
      
      
  </div>
</div>

</body></html>
